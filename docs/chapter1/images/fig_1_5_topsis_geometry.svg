<svg viewBox="0 0 580 410" xmlns="http://www.w3.org/2000/svg">
  <!--
    Геометрична інтерпретація методу TOPSIS (рис. 1.5).
    Площина зважених нормалізованих критеріїв v1, v2 (обидва стимулятори).

    Альтернативи (SVG-координати, пікселі):
      a1 = (165, 110)   a2 = (255, 180)   a3 = (455, 185)   a4 = (320, 315)
    У SVG вісь y спрямована вниз, тому менше y = більше v2.

      min v1 -> a1.x = 165 ;  max v1 -> a3.x = 455
      max v2 -> a1.y = 110 (верх) ;  min v2 -> a4.y = 315 (низ)

    Ідеальні розв'язки за формулою (1.12):
      A+ = (max v1, max v2) = (455, 110)  — верхній правий кут
      A- = (min v1, min v2) = (165, 315)  — нижній лівий кут

    a2 свідомо зміщена від діагоналі A- A+, щоб відрізки S2+ і S2-
    утворювали помітний кут (a2 не лежить на прямій A- A+).

    Ілюстративні відстані для a2 за формулою (1.13):
      S2+ = sqrt((455-255)^2 + (110-180)^2) = sqrt(200^2 + 70^2) ~ 211.9 px
      S2- = sqrt((165-255)^2 + (315-180)^2) = sqrt( 90^2 +135^2) ~ 162.2 px
  -->

  <rect width="580" height="410" fill="white"/>

  <!-- y-axis (v2) -->
  <line x1="95" y1="360" x2="95" y2="45" stroke="black" stroke-width="1.5"/>
  <polygon points="95,45 90,55 100,55" fill="black"/>

  <!-- x-axis (v1) -->
  <line x1="95" y1="360" x2="545" y2="360" stroke="black" stroke-width="1.5"/>
  <polygon points="545,360 535,355 535,365" fill="black"/>

  <!-- Axis names -->
  <text x="553" y="365" font-size="15" font-family="Times New Roman, serif" font-style="italic" fill="black">v&#8321;</text>
  <text x="88" y="42" font-size="15" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="end">v&#8322;</text>

  <!-- Origin label -->
  <text x="87" y="376" font-size="13" font-family="Arial" fill="black" text-anchor="end">0</text>

  <!-- Bounding box: A- (bottom-left) and A+ (top-right) as opposite corners -->
  <rect x="165" y="110" width="290" height="205" fill="none" stroke="#c2c2c2" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Euclidean distances for alternative a2 -->
  <line x1="255" y1="180" x2="455" y2="110" stroke="#7030a0" stroke-width="1.7" stroke-dasharray="6,4"/>
  <line x1="255" y1="180" x2="165" y2="315" stroke="#7030a0" stroke-width="1.7" stroke-dasharray="6,4"/>

  <!-- Alternatives a1..a4 (real points) -->
  <circle cx="165" cy="110" r="5" fill="#1f4e79"/>
  <circle cx="255" cy="180" r="5" fill="#1f4e79"/>
  <circle cx="455" cy="185" r="5" fill="#1f4e79"/>
  <circle cx="320" cy="315" r="5" fill="#1f4e79"/>

  <!-- Positive ideal solution A+ (green diamond) -->
  <polygon points="455,102 463,110 455,118 447,110" fill="#2e7d32"/>

  <!-- Negative ideal solution A- (red diamond) -->
  <polygon points="165,307 173,315 165,323 157,315" fill="#c0392b"/>

  <!-- Alternative labels -->
  <text x="153" y="103" font-size="14" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="end">a&#8321;</text>
  <text x="243" y="171" font-size="14" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="end">a&#8322;</text>
  <text x="468" y="190" font-size="14" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="start">a&#8323;</text>
  <text x="320" y="336" font-size="14" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">a&#8324;</text>

  <!-- A+ label and coordinates -->
  <text x="470" y="115" font-size="15" font-family="Times New Roman, serif" fill="#2e7d32" text-anchor="start"><tspan font-style="italic">A</tspan><tspan font-size="11" dy="-6">+</tspan></text>
  <text x="470" y="131" font-size="11" font-family="Times New Roman, serif" fill="#2e7d32" text-anchor="start">(max v&#8321;, max v&#8322;)</text>

  <!-- A- label and coordinates -->
  <text x="151" y="320" font-size="15" font-family="Times New Roman, serif" fill="#c0392b" text-anchor="end"><tspan font-style="italic">A</tspan><tspan font-size="11" dy="-6">&#8722;</tspan></text>
  <text x="165" y="344" font-size="11" font-family="Times New Roman, serif" fill="#c0392b" text-anchor="middle">(min v&#8321;, min v&#8322;)</text>

  <!-- Distance labels -->
  <text x="361" y="162" font-size="14" font-family="Times New Roman, serif" fill="#7030a0" text-anchor="start"><tspan font-style="italic">S&#8322;</tspan><tspan font-size="11" dy="-6">+</tspan></text>
  <text x="220" y="258" font-size="14" font-family="Times New Roman, serif" fill="#7030a0" text-anchor="start"><tspan font-style="italic">S&#8322;</tspan><tspan font-size="11" dy="-6">&#8722;</tspan></text>
</svg>
