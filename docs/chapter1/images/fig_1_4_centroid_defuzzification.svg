<svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif" font-size="15">

  <!-- White background -->
  <rect width="620" height="340" fill="white"/>

  <!--
    Data: l=1, m=2, u=7  →  d = (1+2+7)/3 = 10/3 ≈ 3.33
    Plot x: 85 … 565  (width=480, scale=80 px/unit)
      l=1  → x = 85
      m=2  → x = 165
      d=3.33 → x = 85 + 2.333*80 ≈ 272
      u=7  → x = 565
    Plot y: 265 (μ=0) … 35 (μ=1)  (height=230)
      At d on slope m→u: μ(d) = (7−3.33)/(7−2) = 0.734
      y_d = 265 − 0.734*230 ≈ 96
  -->

  <!-- Triangle fill -->
  <polygon points="85,265 165,35 565,265"
           fill="#e4e8f5" stroke="none"/>

  <!-- Triangle outline -->
  <polyline points="85,265 165,35 565,265"
            fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Baseline (part of x-axis) -->
  <line x1="85" y1="265" x2="565" y2="265"
        stroke="#1a1a2e" stroke-width="2"/>

  <!-- Dashed vertical line at d=272 -->
  <line x1="272" y1="265" x2="272" y2="96"
        stroke="#1a1a2e" stroke-width="1.5"
        stroke-dasharray="7,4"/>

  <!-- ── Axes ── -->
  <!-- X axis -->
  <line x1="60" y1="265" x2="595" y2="265"
        stroke="#1a1a2e" stroke-width="1.8"/>
  <!-- X arrow -->
  <polygon points="595,260 606,265 595,270" fill="#1a1a2e"/>

  <!-- Y axis -->
  <line x1="60" y1="290" x2="60" y2="18"
        stroke="#1a1a2e" stroke-width="1.8"/>
  <!-- Y arrow -->
  <polygon points="55,18 60,7 65,18" fill="#1a1a2e"/>

  <!-- ── Axis ticks ── -->
  <!-- μ = 1 tick -->
  <line x1="55" y1="35" x2="65" y2="35"
        stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- x-axis ticks for l, m, d, u -->
  <line x1="85"  y1="261" x2="85"  y2="269" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="165" y1="261" x2="165" y2="269" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="272" y1="261" x2="272" y2="269" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="565" y1="261" x2="565" y2="269" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- ── Labels ── -->
  <!-- Axis names -->
  <text x="612" y="269" font-style="italic" font-size="16">x</text>
  <text x="38"  y="12"  font-size="14" text-anchor="middle">μ(x)</text>

  <!-- μ = 1 label -->
  <text x="50" y="39" text-anchor="end" font-size="14">1</text>
  <!-- Origin 0 -->
  <text x="55" y="283" text-anchor="end" font-size="14">0</text>

  <!-- x-axis point labels -->
  <text x="85"  y="283" text-anchor="middle" font-style="italic" font-size="16">l</text>
  <text x="165" y="283" text-anchor="middle" font-style="italic" font-size="16">m</text>
  <text x="272" y="283" text-anchor="middle" font-style="italic" font-size="16">d</text>
  <text x="565" y="283" text-anchor="middle" font-style="italic" font-size="16">u</text>

  <!-- Peak label at (m, 1) -->
  <text x="169" y="27" text-anchor="middle" font-size="13">(m, 1)</text>

  <!-- Formula for d below the axis -->
  <text x="310" y="318" text-anchor="middle" font-size="14"
        font-style="italic">
    d = (l + m + u) / 3
  </text>

  <!-- Small dot at apex -->
  <circle cx="165" cy="35" r="3" fill="#1a1a2e"/>
  <!-- Small dot at d on the slope -->
  <circle cx="272" cy="96" r="3" fill="#1a1a2e" stroke="white" stroke-width="1"/>

  <!-- Horizontal dashed guide at d-height (optional, subtle) -->
  <!-- Not adding to keep it clean -->

</svg>
