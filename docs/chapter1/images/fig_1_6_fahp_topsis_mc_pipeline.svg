<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1605 885">
<defs>
<marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="16.5" markerHeight="13.5" refX="13.5" refY="5.25" orient="auto"><path d="M0,0 L9,5.25 L0,10.5 Z" fill="#333333" /></marker>
<marker id="arrowP" markerUnits="userSpaceOnUse" markerWidth="16.5" markerHeight="13.5" refX="13.5" refY="5.25" orient="auto"><path d="M0,0 L9,5.25 L0,10.5 Z" fill="#333333" /></marker>
</defs>
<rect width="1605" height="885" fill="white"/>

<!-- outer dashed container -->
<rect x="558" y="57" width="534" height="783" rx="18" fill="#ffffff" stroke="#5b6470" stroke-width="2.4" stroke-dasharray="9,7.5"/>

<!-- FAHP box -->
<rect x="615" y="126" width="420" height="135" rx="10.5" fill="#ffffff" stroke="#4d4d4d" stroke-width="2.25"/>
<text x="825" y="203" font-family="Times New Roman, serif" font-size="25" fill="#1a1a1a" text-anchor="middle">FAHP &#8211; зважування критеріїв</text>

<!-- TOPSIS box (2 lines) -->
<rect x="615" y="336" width="420" height="135" rx="10.5" fill="#ffffff" stroke="#4d4d4d" stroke-width="2.25"/>
<text x="825" y="379" font-family="Times New Roman, serif" font-size="25" fill="#1a1a1a" text-anchor="middle">TOPSIS &#8211; ранжування</text>
<text x="825" y="412" font-family="Times New Roman, serif" font-size="25" fill="#1a1a1a" text-anchor="middle">альтернатив</text>

<!-- MC box (2 lines) -->
<rect x="615" y="546" width="420" height="270" rx="10.5" fill="#ffffff" stroke="#4d4d4d" stroke-width="2.25"/>
<text x="825" y="577" font-family="Times New Roman, serif" font-size="25" fill="#1a1a1a" text-anchor="middle">Монте-Карло &#8211;</text>
<text x="825" y="610" font-family="Times New Roman, serif" font-size="25" fill="#1a1a1a" text-anchor="middle">аналіз чутливості</text>

<!-- inner loop dashed -->
<rect x="648" y="630" width="354" height="168" rx="13.5" fill="#ffffff" stroke="#888888" stroke-width="2.1" stroke-dasharray="7.5,6"/>
<text x="825" y="657" font-family="Times New Roman, serif" font-size="20" fill="#333333" text-anchor="middle">Внутрішній цикл за t = 1, ..., N</text>
<rect x="705" y="678" width="240" height="66" rx="9" fill="#ffffff" stroke="#888888" stroke-width="2.1"/>
<text x="825" y="718.5" font-family="Times New Roman, serif" font-size="18" fill="#1a1a1a" text-anchor="middle">Повторний запуск TOPSIS</text>
<path d="M945,726 L976.5,726 L976.5,696 L946.5,696" fill="none" stroke="#888888" stroke-width="2.4" marker-end="url(#arrowP)"/>
<text x="800" y="780" font-family="Times New Roman, serif" font-size="19" fill="#333333" text-anchor="middle">t &#8592; t + 1</text>

<!-- inter-box arrows and labels -->
<line x1="825" y1="261" x2="825" y2="336" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>
<text x="843" y="306" font-family="Times New Roman, serif" font-size="21" fill="#1a1a1a" text-anchor="start">вектор ваг W</text>
<line x1="825" y1="471" x2="825" y2="546" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>
<text x="843" y="516" font-family="Times New Roman, serif" font-size="21" fill="#1a1a1a" text-anchor="start">рангова функція TOPSIS</text>

<!-- left input boxes -->
<rect x="60" y="115.5" width="405" height="156" rx="12" fill="#ffffff" stroke="#888888" stroke-width="2.55"/>
<text x="262.5" y="165" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">Експертні попарні</text>
<text x="262.5" y="196" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">порівняння критеріїв</text>
<text x="262.5" y="227" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">за нечіткою шкалою Сааті</text>

<rect x="60" y="343.5" width="405" height="120" rx="12" fill="#ffffff" stroke="#888888" stroke-width="2.55"/>
<text x="262.5" y="394" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">Матриця рішень X</text>
<text x="262.5" y="428" font-family="Times New Roman, serif" font-size="21" fill="#555555" text-anchor="middle">(локації &#215; критерії)</text>

<line x1="465" y1="193.5" x2="615" y2="193.5" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>
<line x1="465" y1="403.5" x2="615" y2="403.5" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>

<!-- right output box 1 (2 lines) -->
<rect x="1185" y="334.5" width="360" height="138" rx="12" fill="#ffffff" stroke="#888888" stroke-width="2.55"/>
<text x="1365" y="388" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">Ранжування локацій за</text>
<text x="1365" y="421" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">коефіцієнтом близькості C*</text>

<!-- right output box 2 (title only) -->
<rect x="1185" y="606" width="360" height="150" rx="12" fill="#ffffff" stroke="#888888" stroke-width="2.55"/>
<text x="1365" y="681" font-family="Times New Roman, serif" font-size="23" fill="#1a1a1a" text-anchor="middle">Індекси прийнятності рангів</text>

<!-- output arrows -->
<line x1="1035" y1="403.5" x2="1185" y2="403.5" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>
<line x1="1035" y1="681" x2="1185" y2="681" stroke="#333333" stroke-width="2.55" marker-end="url(#arrow)"/>
</svg>
