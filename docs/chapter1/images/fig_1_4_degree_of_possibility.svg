<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    M2 = (l2=150, m2=310, u2=570) — left triangle (blue)
    M1 = (l1=410, m1=670, u1=830) — right triangle (red)
    y-axis: μ=0 at y=420, μ=1 at y=50; span = 370 px

    M2 falling: μ_M2(x) = (570−x)/260, x∈[310,570]
    M1 rising:  μ_M1(x) = (x−410)/260,  x∈[410,670]
    Equal denominators → intersection exactly at midpoint:
      (570−x)/260 = (x−410)/260  →  x = 490
    μ_d = 80/260 ≈ 0.308
    y_d  = 420 − 0.308·370 ≈ 306

    Order: l2(150) < m2(310) < l1(410) < d(490) < u2(570) < m1(670) < u1(830) ✓
    Gaps:         160        100        80       80        100        160  (symmetric)

    Check via formula (1.8):
      V = (l1−u2) / ((m2−u2)−(m1−l1))
        = (410−570) / ((310−570)−(670−410))
        = (−160) / (−260−260)
        = 160/520 ≈ 0.308 ✓
  -->

  <rect width="900" height="480" fill="white"/>

  <!-- y-axis -->
  <line x1="110" y1="420" x2="110" y2="40" stroke="black" stroke-width="1.5"/>
  <polygon points="110,40 105,50 115,50" fill="black"/>

  <!-- x-axis -->
  <line x1="110" y1="420" x2="858" y2="420" stroke="black" stroke-width="1.5"/>
  <polygon points="858,420 848,415 848,425" fill="black"/>

  <!-- Axis names -->
  <text x="866" y="425" font-size="15" font-family="Times New Roman, serif" font-style="italic" fill="black">x</text>
  <text x="106" y="36" font-size="13" font-family="Times New Roman, serif" fill="black" text-anchor="end">μ(x)</text>

  <!-- y-axis labels -->
  <text x="100" y="425" font-size="13" font-family="Arial" fill="black" text-anchor="end">0</text>
  <line x1="105" y1="50" x2="115" y2="50" stroke="black" stroke-width="1.5"/>
  <text x="100" y="55" font-size="13" font-family="Arial" fill="black" text-anchor="end">1</text>

  <!-- Horizontal dashed at μ=1 (from y-axis to M1 peak) -->
  <line x1="110" y1="50" x2="670" y2="50" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- M2 triangle fill + outline: l2=150, m2=310, u2=570 -->
  <polygon points="150,420 310,50 570,420" fill="#cfe2f3" opacity="0.35"/>
  <line x1="150" y1="420" x2="310" y2="50" stroke="#1f4e79" stroke-width="2.2"/>
  <line x1="310" y1="50" x2="570" y2="420" stroke="#1f4e79" stroke-width="2.2"/>

  <!-- M1 triangle fill + outline: l1=410, m1=670, u1=830 -->
  <polygon points="410,420 670,50 830,420" fill="#fce4d6" opacity="0.4"/>
  <line x1="410" y1="420" x2="670" y2="50" stroke="#c0392b" stroke-width="2.2"/>
  <line x1="670" y1="50" x2="830" y2="420" stroke="#c0392b" stroke-width="2.2"/>

  <!-- Vertical dashed from M2 peak (m2=310) to x-axis -->
  <line x1="310" y1="50" x2="310" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Vertical dashed from M1 peak (m1=670) to x-axis -->
  <line x1="670" y1="50" x2="670" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Intersection point at (490, 306) -->
  <circle cx="490" cy="306" r="4" fill="#7030a0"/>

  <!-- Vertical dashed from intersection to x-axis -->
  <line x1="490" y1="306" x2="490" y2="420" stroke="#7030a0" stroke-width="1.3" stroke-dasharray="5,4"/>

  <!-- Horizontal dashed from y-axis to intersection (shows V value) -->
  <line x1="110" y1="306" x2="490" y2="306" stroke="#7030a0" stroke-width="1.3" stroke-dasharray="5,4"/>

  <!-- V(M2>=M1) tick on y-axis + label -->
  <line x1="105" y1="306" x2="115" y2="306" stroke="#7030a0" stroke-width="1.5"/>
  <text x="101" y="303" font-size="11" font-family="Times New Roman, serif" fill="#7030a0" text-anchor="end">V(M₂≥M₁)</text>

  <!-- Tick marks on x-axis -->
  <line x1="150" y1="415" x2="150" y2="425" stroke="black" stroke-width="1.5"/>
  <line x1="310" y1="415" x2="310" y2="425" stroke="black" stroke-width="1.5"/>
  <line x1="410" y1="415" x2="410" y2="425" stroke="black" stroke-width="1.5"/>
  <line x1="490" y1="415" x2="490" y2="425" stroke="#7030a0" stroke-width="1.5"/>
  <line x1="570" y1="415" x2="570" y2="425" stroke="black" stroke-width="1.5"/>
  <line x1="670" y1="415" x2="670" y2="425" stroke="black" stroke-width="1.5"/>
  <line x1="830" y1="415" x2="830" y2="425" stroke="black" stroke-width="1.5"/>

  <!-- x-axis labels: corrected order l2 < m2 < l1 < d < u2 < m1 < u1 -->
  <text x="150" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">l₂</text>
  <text x="310" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">m₂</text>
  <text x="410" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">l₁</text>
  <text x="490" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="#7030a0" text-anchor="middle">d</text>
  <text x="570" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">u₂</text>
  <text x="670" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">m₁</text>
  <text x="830" y="443" font-size="12" font-family="Times New Roman, serif" font-style="italic" fill="black" text-anchor="middle">u₁</text>

  <!-- Labels near peaks -->
  <text x="300" y="37" font-size="13" font-family="Times New Roman, serif" font-style="italic" fill="#1f4e79" text-anchor="middle">M₂</text>
  <text x="680" y="37" font-size="13" font-family="Times New Roman, serif" font-style="italic" fill="#c0392b" text-anchor="middle">M₁</text>
</svg>
