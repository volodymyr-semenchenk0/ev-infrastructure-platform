# План: оздоровлення агентів і скілів проєкту (.claude/)
# Мета: прибрати застарілий "стан" (числа, шляхи, bib-ключі) з інструкцій,
# лишити лише довговічні правила; усунути дублі агент↔скіл.
# Принцип: інструкція описує ЯК ЗНАЙТИ І ПЕРЕВІРИТИ, а не ЯКЕ ЗАРАЗ ЗНАЧЕННЯ.
# Згенеровано в Cowork-сесії як ПЛАН. Жодних змін до підтвердження користувача.

meta:
  title: "Абстрагування агентів/скілів: стан → правила; усунення дублів"
  project: "ev-charging-dss (курсова, спец. 124, ЧНУ)"
  date: "2026-05-30"
  author: "Volodymyr"
  vcs_note: "Claude Code НЕ робить комітів (Cowork). Версійний контроль робить користувач."

motivation: >-
  Агенти/скіли застаріли, бо закодували СТАН (C*=0,5772; «10 критеріїв»;
  master.md; bib-ключ chang1996extent), а не ПРАВИЛА. Будь-який знімок протухає,
  щойно зрушила реальність, і його ніхто не згадує оновити, бо він лежить
  осторонь справжнього джерела істини (тест, Розділ 3, .bib). Лікування –
  переписати інструкції так, щоб вони посилалися на джерело, а не копіювали його.

# --- ОФІЦІЙНІ РЕКОМЕНДАЦІЇ ANTHROPIC (звірено з docs.claude.com 2026-05-30) ---
# Джерела: code.claude.com/docs/en/sub-agents, .../skills, .../memory
official_guidance:
  subagents:
    - "Frontmatter: обов'язкові лише name + description; опційні tools, model, skills, тощо."
    - "Best practices (офіц.): один чіткий фокус на агента; детальний description (за ним Claude делегує); обмежувати tools; чекінити в git."
    - "ВАЖЛИВО: тіло офіційних прикладів-агентів (code-reviewer, debugger) НЕ ультратонке – містить робочий процес і чек-лист. Тож «агент = 15-25 рядків» було занадто жорстко. Правильно: focused + детальний опис + workflow, але БЕЗ дублювання знань зі скілів і БЕЗ хардкоду фактів."
    - "CLAUDE.md + вся memory-ієрархія АВТОМАТИЧНО вантажиться в кожен кастомний субагент (окрім вбудованих Explore/Plan). → Не дублювати правила проєкту в тілі агента: вони там уже є."
    - "Поле `skills:` у фронтматері препідвантажує ПОВНИЙ вміст скіла в контекст агента при старті. Це штатний спосіб дати агенту знання, НЕ копіюючи його inline."
    - "Субагент НЕ може породжувати інших субагентів; для вкладеності – скіли або ланцюг субагентів з основної розмови."
    - "Паралельність субагентів – офіційно підтримана (Run parallel research). Мета користувача коректна."
    - "Кожен субагент стартує з порожнім ізольованим контекстом (історію розмови не бачить)."
  skills:
    - "Створювати скіл, коли «секція CLAUDE.md виросла в ПРОЦЕДУРУ, а не факт», або коли постійно копіюєш ту саму інструкцію/чек-лист."
    - "Тіло скіла вантажиться ЛИШЕ при використанні → довгий reference-матеріал майже нічого не коштує, поки не потрібен (progressive disclosure)."
    - "SKILL.md: frontmatter name + description (з тригером-натяком КОЛИ використовувати); тіло тримати компактним, велике – виносити у reference/ (рекомендація < ~500 рядків тіла)."
    - "Скіли працюють у контексті ОСНОВНОЇ розмови (на відміну від ізольованого субагента) – обирати скіл, коли потрібен повторюваний промпт/воркфлоу без ізоляції."
  claude_md:
    - "Вантажиться як user-повідомлення в КОЖНІЙ сесії й у кожен субагент → тримати коротким; класти прямі команди-правила, не довгі процедури."
    - "Прямі директиви («Never use X») дотримуються краще за побажання («ми зазвичай уникаємо X»); доречні IMPORTANT/YOU MUST."
    - "Орієнтир: тримати компактним (спільнота — < ~200 рядків); довгі специфічні процедури – у скіли, не сюди."
  resolved_design_questions:
    - "Питання «видаляти debugger/tester?» → НЕ обов'язково видаляти. Краще: лишити як focused-ролі, але (а) прибрати дубль знань, (б) через поле skills: підвантажувати відповідний engineering-скіл, (в) прибрати хардкод фактів. Видалення – лише якщо роль реально не дає нічого понад скіл."
    - "Питання «специфіку — в зовнішній скіл?» → Ні. Зовнішні (плагінні) скіли не редагувати (апстрім перезапише); проєктну специфіку тримати окремим скілом-дельтою або в CLAUDE.md."
    - "Питання «半 скілів — у CLAUDE.md?» → Ні. CLAUDE.md у кожному контексті; довгі процедури туди не класти. Скорочення досягається стоншенням скілів (викид дублів зовнішніх), а не переїздом у CLAUDE.md."

# --- ПЕРЕВІРЕНІ ФАКТИ (станом на 2026-05-30, звірено з кодом) ----------------
verified_facts:
  real_bib_keys:
    - "chang_applications_1996 (НЕ chang1996extent)"
    - "buckley_fuzzy_1985 (НЕ buckley1985fuzzy)"
    - "saaty_analytic_2022 (НЕ saaty1980ahp / saaty1977scaling)"
    - "hwang_multiple_2012 (НЕ hwang1981mcdm)"
    - "kahraman_fuzzy_2008, wang_extent_2008"
    - "Helton/LHS-джерела у .bib НЕМАЄ – будь-яка згадка ключа вигадана."
  real_fahp:
    - "Функція: fahp_weights (НЕ fahp). Метод: Buckley geometric mean + центроїд."
    - "Тести: test_fahp_weights_* (sum_to_one, equal_comparison, analytic_oracle, no_zero_weights, dominant_criterion)."
    - "Оракул: ANALYTIC_EXPECTED = [0.629498, 0.263186, 0.107315]; EQUAL → 1/3."
  criteria_count: "9 критеріїв (seed.py:1,54). Будь-яке «10» / «m=10» / «c₁–c₁₀» застаріле."
  nonexistent_paths:
    - "build/master.md, master.md – НЕ існують (але ще згадані в seed.py:54, агентах, tester/verifier)."
    - "ref_mcdm_formulas.md, ref_master_doc.md – НЕ існують (висячі посилання)."

# --- ДОВГОВІЧНІ ІНВАРІАНТИ (зберегти, але в ОДНОМУ місці – CLAUDE.md) --------
invariants_to_keep:
  note: >-
    Це НЕ стан, а стійкі правила проєкту. Їх цінність реальна, загальні скіли
    їх не дають. Зберегти, сконцентрувавши у CLAUDE.md, не розсіюючи по агентах.
  list:
    - "Математика лише в app/backend/mcdm/; mcdm/ не імпортує api/services/db."
    - "Заборонені методи: LSTM, генетичні алгоритми. Заборонені UI: jQuery, Bootstrap."
    - "TDD у mcdm/: спершу падаючий тест із числовим еталоном, потім реалізація."
    - "Mock-и в тестах mcdm/ заборонені – лише реальні числові приклади."
    - "Це КУРСОВА (не МДР); форматування – за docs/ВИМОГИ_ОФОРМЛЕННЯ_ДОКУМЕНТА.md; тире –."
    - "Коміти/коментарі англійською; без епітетів (Robust/Production-ready/...)."
    - "Без комітів через Cowork; merge лише з явного дозволу користувача."

# --- РІШЕННЯ ПО АГЕНТАХ ------------------------------------------------------
agents:
  # Перегляд після офіційної документації: focused-ролі лишаємо (потрібні для
  # паралелізму й ізоляції), але прибираємо дубль знань і хардкод. Знання даємо
  # через поле skills: (препідвантаження), а не inline-копією.
  keep_as_role_thin_out:
    - name: "debugger"
      keep: "Роль focused-діагноста з власним контекстом і правом Edit (офіц. приклад-агент 'debugger' існує саме такий)."
      thin_out: >-
        Прибрати дубльований із engineering-debug каталог/схему. Через frontmatter
        `skills: [engineering-debug]` підвантажувати плейбук, а не копіювати його.
        У тілі лишити лише роль + порядок дій + які tools. Прибрати застарілі номери
        формул і Chang-діагностику; CLAUDE.md в агент і так вантажиться.
    - name: "tester"
      keep: "Роль focused-тестувальника з Write/Edit і власним контекстом."
      thin_out: >-
        Через `skills: [engineering-testing-strategy]` підвантажувати TDD-плейбук,
        не копіювати. Прибрати ВСІ застарілі еталони (ваги Chang 4×4; C*=0,5772/0,6830;
        ρ_s; «10 критеріїв»; master.md). Числа – лише посиланням на test_fahp.py / Розділ 3."
    - name: "mcdm-verifier"
      keep: "Унікальна верифікаційна роль."
      thin_out: >-
        Прибрати ВЕСЬ блок захардкоджених еталонів (ваги c₁–c₁₀, C*=0,5772/0,6830,
        ρ_s=0,671, MC p_i(k)) і посилання master.md/ref_*.md. Замінити на процедуру
        перевірки ІНВАРІАНТІВ: усі ваги>0, Σ=1, монотонність за пріоритетами,
        C*∈[0,1], детермінізм MC за seed; конкретні числа звіряти з ФАКТИЧНИМ
        прогоном (тест + Розділ 3), не з копією в інструкції."
  keep_and_fix:
    - name: "coursework-editor"
      keep: "Єдиний редактор тексту курсової."
      rewrite: >-
        Полагодити обірваний рядок ~102; прибрати build/master.md, ref_master_doc.md,
        битий шлях до coursework-formatting; джерело форматування – лише
        ВИМОГИ_ОФОРМЛЕННЯ_ДОКУМЕНТА.md. Прибрати тезу про синхронізацію чисел тексту з тестами.
    - name: "frontend"
      keep: "Унікальний скоуп React/MapLibre."
      rewrite: "«m=10»/«10 значень критеріїв» → не фіксувати число; брати кількість критеріїв з API/схеми динамічно. Ранг-логіку не прив'язувати до фікс. числа локацій."
  keep_as_is:
    - name: "devops"
      reason: "Унікальний інфра-скоуп; без застарілих чисел і висячих посилань."

# --- РІШЕННЯ ПО СКІЛАХ -------------------------------------------------------
skills:
  keep_as_is:
    - "engineering-system-design – чистий, без застарілих даних."
    - "coursework-docx-build – pandoc-пайплайн, унікальний, коректний."
  keep_and_fix:
    - name: "engineering-testing-strategy"
      priority: "НАЙВИЩА (найбільше застарілого)"
      rewrite: >-
        Таблицю «джерел еталонів» із bib-ключами або прибрати, або замінити вказівкою
        «ключі брати з docs/sources/EV Charging.bib» (НЕ копіювати ключі в скіл).
        Приклад test_fahp_chang1996_example з вагами Chang → прибрати або замінити
        абстрактним «оракул FAHP – у app/backend/mcdm/tests/test_fahp.py». TDD-вступ
        скоротити до посилання на симлінк test-driven-development.
    - name: "engineering-documentation"
      rewrite: "Приклад docstring def fahp() з Chang/chang1996extent → переписати під fahp_weights/Buckley або зробити абстрактним («docstring у mcdm/ містить References: + BibTeX-ключ із .bib»). Не хардкодити ключ."
    - name: "engineering-code-review"
      rewrite: "Рядок із переліком джерел еталонів (Chang/Saaty/Hwang/Helton) → «джерела й ключі звіряти з .bib». Edge-case extent analysis → формулювання, не прив'язане до Chang."
    - name: "engineering-debug"
      rewrite: "Chang-діагностику «не сумує до 1 після extent analysis» → нейтральне «звір нормалізацію у fahp.py». Ключ saaty1977scaling прибрати. Методологічний вступ скоротити до посилання на systematic-debugging; лишити проєктний каталог багів. Цей скіл підвантажується в агента debugger через frontmatter `skills:`."
    - name: "engineering-architecture"
      rewrite: "Приклад «Chang vs Buckley як відкритий вибір» → позначити як вирішене (ADR-0002 Accepted: Buckley) або взяти інший нейтральний приклад."
  thin_to_delta_over_external:
    note: >-
      Офіц. рекомендація: зовнішні (плагінні/симлінк) скіли НЕ редагувати – апстрім
      перезапише. Проєктний скіл стоншити до ДЕЛЬТИ, що посилається на зовнішній.
    list:
      - "engineering-testing-strategy → дельта над симлінком test-driven-development (лишити лише mcdm-специфіку: еталони з .bib, заборона mock, оракул у test_fahp.py)."
      - "engineering-debug → дельта над симлінком systematic-debugging (лишити лише проєктний каталог багів)."
  resolve_duplication:
    - "coursework-formatting ↔ docs/ВИМОГИ_ОФОРМЛЕННЯ_ДОКУМЕНТА.md: призначити md-файл єдиним джерелом базової типографіки; скіл лишити надбудовою (логістика захисту, grading, літери додатків), що ПОСИЛАЄТЬСЯ на md, а не копіює константи."
  abstraction_principle:
    - "Жодних номерів рядків у тексті інструкцій (Drive-sync їх зсуває)."
    - "Жодних конкретних C*/ваг/ρ_s/p_i(k) – лише посилання на тест і Розділ 3."
    - "Жодних скопійованих bib-ключів – лише «бери з .bib»."
    - "Шляхи – лише до файлів, що ГАРАНТОВАНО існують; неіснуючі (master.md) прибрати."

# --- CLAUDE.md (теж застаріло) ----------------------------------------------
claude_md_fixes:
  - "Опис mcdm-verifier (табл. агентів): прибрати «звір з master.md. Знає еталонні C* і p_i(k)» → «верифікує mcdm/ прогоном тестів і перевіркою інваріантів»."
  - "Опис coursework-editor: прибрати «build/master.md»."
  - "Приклад коміту «...fahp from Chang 1996» → «...fahp from Buckley 1985»."
  - "Блок «Поточний стан (2026-05-25)»: оновити – FAHP мігровано на Buckley; критеріїв 9 (не «seed для 2/10/12»); дату освіжити."
  - "Додати короткий принцип: інструкції посилаються на джерело істини (тест/.bib/Розділ 3), не дублюють числа."
  - "НЕ переносити каталог багів/процедури в CLAUDE.md (він у кожному контексті) – тримати у скілах."

# --- ПОРЯДОК ВИКОНАННЯ (кожен крок – diff на затвердження перед Edit) --------
execution_order:
  - "0. Звірити поточні номери рядків кожного файлу безпосередньо перед його правкою (Drive-sync)."
  - "1. mcdm-verifier – прибрати еталони, перевести на інваріанти (найвищий пріоритет)."
  - "2. CLAUDE.md – виправити описи агентів, приклад коміту, блок стану."
  - "3. debugger, tester – стоншити: прибрати дубль/хардкод, додати frontmatter `skills:` на відповідний engineering-скіл."
  - "4. engineering-testing-strategy, -documentation, -code-review, -debug, -architecture – абстрагувати; де доречно – звести до дельти над зовнішнім симлінком."
  - "5. coursework-editor, frontend – прибрати застарілі шляхи/числа."
  - "6. coursework-formatting – звести до надбудови над ВИМОГИ_ОФОРМЛЕННЯ."
  - "7. Звести джерело істини: жодних дублів числа/ключа/шляху; фінальний grep на master.md / chang1996extent / «10 критеріїв»."

acceptance_criteria:
  - "У .claude/ немає посилань на master.md / ref_mcdm_formulas.md / ref_master_doc.md."
  - "У .claude/ немає скопійованих bib-ключів і захардкоджених C*/ваг/ρ_s/p_i(k)."
  - "У .claude/ немає «10 критеріїв»/«m=10» (актуально 9, але краще – динамічно)."
  - "Агенти debugger/tester лишилися focused-ролями, але без дубль-знань: плейбук – через `skills:`, не inline."
  - "Зовнішні (плагінні/симлінк) скіли не редаговані; проєктні – дельта над ними."
  - "CLAUDE.md описує агентів/стан актуально; типографіка – одне джерело істини."
  - "Інструкції посилаються на джерело (тест/.bib/Розділ 3), а не копіюють значення."

out_of_scope:
  - "Числа C* для Розділу 3 – окремо, прив'язано до прогону реальної задачі (plan_chang_to_buckley.yaml, part_b)."
  - "ADR-0002 створення – фаза 9 плану міграції (окремо)."
  - "seed.py:54 згадка master.md – код, не .claude/; виправити при роботі над db, не тут."

notes:
  - "Видалення dублів зменшує кількість місць для синхронізації – головна причина протухання."
  - "Абстрагування знімає потребу вгадувати факти: інструкція каже «подивись у джерелі»."
