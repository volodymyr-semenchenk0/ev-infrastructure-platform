      - "r2 = (0.793701, 1.000000, 1.259921)"
      - "r3 = (0.346681, 0.405480, 0.500000)"
    expected_weights: [0.629498, 0.263186, 0.107315]   # сума = 1, порядок C1>C2>C3
    tolerance: 1e-6
  literature_oracle:
    source: "kahraman_fuzzy_2008, §2.4 (Buckley's Fuzzy AHP), числовий приклад"
    action: "Витягти точні вхідні TFN і опубліковані ваги з PDF docs/sources/files/90/ і закласти як третій оракул із посиланням на сторінку."
    caveat: >-
      ПЕРЕВІРИТИ метод дефаззифікації у прикладі Kahraman: якщо в джерелі застосовано
      іншу дефаззифікацію (не центроїд (l+m+u)/3), опубліковані ваги НЕ зійдуться з
      реалізацією цього плану. У такому разі або перерахувати ваги прикладу під центроїд
      вручну, або взяти інший літературний приклад саме з центроїдною дефаззифікацією.
      Без цієї звірки оракул literature_oracle може хибно провалити тест.

