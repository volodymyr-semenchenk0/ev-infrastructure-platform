  status: "DONE — Розділ 1 і Розділ 2 оновлено та затверджено користувачем (сесія 2026-05-30)."
  summary:
    - "1_2_2: апарат Buckley – середнє геометричне рядка z_i (1.7), нечітка вага w_i (1.8), центроїдна дефаззифікація (1.9); рис. 1.4 → центроїдна дефаззифікація; абзац-обґрунтування [@wang_extent_2008]; нумерація формул без зсуву."
    - "1_2_1: [@chang_applications_1996] лишено як загальне джерело FAHP (рішення користувача)."
    - "1_2_5: alt-текст рис. 1.6 → «метод Баклі»."
    - "1_3: без змін (Chang-специфіки немає)."
    - "2_3_1 + fig_2_7_fahp_activity.puml: кроки 5–8 і дії діаграми → Buckley."
    - "Рисунки (fig_1_4_centroid_defuzzification.svg, fig_1_6, fig_2_7.png) – перегенеровано окремою сесією."
  terminology_note: >-
    У тексті курсової метод названо кирилицею «Баклі» (рішення користувача).
    У коді/докстрингах/тестах – латиницею «Buckley» (англомовні коментарі за CLAUDE.md).

# --- GATE перед кодом -------------------------------------------------------
gate_before_code:
  done_when: "Користувач дав явний дозвіл переходити до коду (фази 4–8)."

# --- ФАЗИ (КОД) -------------------------------------------------------------
phases:
  - id: 4
    name: "RED: падаючі тести з еталонними числами"
    agent: "tester (або engineering-testing-strategy перед написанням)"
    files: ["app/backend/mcdm/tests/test_fahp.py"]
    steps:
      - "Оновити докстринги: прибрати посилання на Chang (1996), додати Buckley (1985)."
      - "Лишити тест EQUAL (усі (1,1,1)) → очікувано [1/3,1/3,1/3] – інваріант, що тримається і для Buckley."
      - "Оновити тест DOMINANT: лишити перевірку порядку (w[0]>w[1], w[0]>w[2]); прибрати міркування «близько 1» (це Chang)."
      - "Додати оракул analytic_3x3 (див. reference_vectors) – перевірений програмно й вручну."
      - "Додати тест ВІДСУТНОСТІ нулів: для будь-якої консистентної матриці усі ваги > 0."
      - "literature_oracle з Kahraman §2.4 НЕ використовувати як прямий оракул – приклад трапецієподібний (4-кортежі), не трикутний; деталі у reference_vectors.literature_oracle."
    done_when: "pytest mcdm/ червоний саме через нову (ще не реалізовану) поведінку."

  - id: 5
    name: "GREEN: реалізація Buckley у ядрі"
    files: ["app/backend/mcdm/fahp.py"]
    steps:
      - "Лишити _RI і _consistency_ratio без змін; CR-гейт (CR>0.1 → ValueError) лишити."
      - "Видалити _degree_of_possibility і блок синтетичних екстентів/min-нормалізації."
      - "Реалізувати: z_i = (∏_j a_ij)^(1/n) поелементно по (l,m,u); сума z по критеріях S=(Sl,Sm,Su); fuzzy weight w_i = z_i ⊗ (1/Su, 1/Sm, 1/Sl); дефаззифікація центроїдом (l+m+u)/3; нормалізація."
      - "Оновити докстринг функції: Buckley (1985), centroid defuzz; прибрати згадку Chang."
    done_when: "pytest mcdm/ зелений; усі оракули сходяться."

  - id: 6
    name: "REFACTOR + якість ядра"
    steps:
      - "ruff check . – чисто; mypy mcdm/ --strict – без помилок."
      - "Коментарі пояснюють «чому» (геометричне середнє замість екстентів), без епітетів/маркетингу."
    done_when: "ruff і mypy --strict mcdm/ зелені; код охайний."

  - id: 7
    name: "Верифікація математики"
    agent: "mcdm-verifier"
    steps:
      - "Звірити ваги з еталонними числами (reference_vectors)."
      - "На реальних профілях municipal/investor (n=10) підтвердити 0 нулів і монотонність ваг за пріоритетами."
      - "Підтвердити, що TOPSIS-ранжування тепер враховує всі критерії (немає обнулених стовпців)."
    done_when: "mcdm-verifier підтверджує коректність і відсутність нулів."

  - id: 8
    name: "Підсумкова верифікація системи"
    steps:
      - "make all (ruff + mypy --strict mcdm/ + pytest) – зелений."
      - "Підняти uvicorn; GET /api/profiles/{id} повертає ваги без нулів для обох профілів."
      - "Підняти vite; форма й результати рендеряться (інтерфейс ваг не змінювався)."
    done_when: "Усі перевірки зелені; ваги ненульові; API і UI працюють."

  - id: 9
    name: "Оновлення агентів і скілів проєкту (.claude/)"
    note_files_dont_exist: >-
      ref_mcdm_formulas.md, ref_master_doc.md і master.md (build/master.md) НЕ існують
      у репозиторії – це висячі посилання в описах агентів. Реальні еталонні числа
      захардкоджені прямо в mcdm-verifier.md і tester.md. Тому правимо ці файли, а не
      неіснуючі нотатки.
    part_a_method_and_literature:    # робити РАЗОМ з міграцією
      - "agents/tester.md (рядки ~40–43): «FAHP за Чангом (Chang 1996)» з ваги w₁≈0,2845… і `pymcdm.methods.FAHP` → замінити на Buckley-приклад (аналітичний оракул analytic_3x3 із цього плану)."
      - "agents/debugger.md (рядок ~74): запис про ваги з формулою Чанга `w_i=d'(A_i)/Σd'` і випадком «усі d'=0» → переписати під Buckley (центроїдна дефаззифікація; випадок нульових ваг зникає)."
      - "skills/engineering-testing-strategy/SKILL.md (рядки ~30–51): приклад коміту й `test_fahp_chang1996_example`, таблиця еталонів → зробити Buckley головним рядком; ВИПРАВИТИ bib-ключі `chang1996extent`/`buckley1985fuzzy` → `chang_applications_1996`/`buckley_fuzzy_1985`."
      - "skills/engineering-code-review/SKILL.md (рядок ~46): у переліку джерел еталонів додати Buckley 1985 і Kahraman 2008 (замість/поряд із Chang 1996)."
      - "skills/engineering-debug/SKILL.md (розділ «A2. FAHP ваги не сумують до 1»): звірити й узгодити з новою нормалізацією Buckley."
      - "agents/coursework-editor.md (рядок ~101): додати разовий виняток – під час міграції числа результатів ЗМІНЯТЬСЯ (правило «не міняти числа» тимчасово не діє)."
    part_b_reference_numbers:        # downstream: лише ПІСЛЯ перерахунку
      - "agents/mcdm-verifier.md (рядки 24–37): ваги, C* (L2=0,5772, L7=0,6830…), ρ_s=0,671, MC p_i(k) пораховані під Чанга → перерахувати ПІСЛЯ реалізації Buckley і повторного прогону задачі."
      - "agents/tester.md (рядки ~47–84): master.md-еталони C* (0,5772/0,6830) – так само під перерахунок."
      - "Ці числа неможливо оновити наосліп: вони є експериментальними виходами й залежать від нових ваг; реальне оновлення прив'язане до майбутнього Розділу 3."
    optional_cleanup:
      - "Прибрати або матеріалізувати висячі посилання ref_mcdm_formulas.md / ref_master_doc.md / master.md у всіх агентах (debugger.md:126, mcdm-verifier.md:65,86, tester.md:16,154, coursework-editor.md:104). Не обов'язково для міграції."
    new_adr:
      - "skills/engineering-architecture: створити ADR-0002 у docs/adr/ з рішенням «Chang extent analysis → Buckley geometric mean» (контекст, причина – нульові ваги/wang_extent_2008, наслідки)."
    caveat_for_verifier: >-
      У фазі 7 mcdm-verifier видасть розбіжності по захардкоджених C* (це очікувано –
      числа ще не перераховані). Під час міграції покладатися на нові оракули з цього
      плану і на тест відсутності нулів, а не на застарілі master.md-C*.
    done_when: "Частина A і ADR-0002 виконані; частина B позначена «під перерахунок»; (опційно) висячі посилання почищені."

# --- ЕТАЛОННІ ВЕКТОРИ ДЛЯ ТЕСТІВ (обчислені й перевірені) -------------------
reference_vectors:
  equal_3x3:
    input: "усі a_ij = (1,1,1)"
    expected_weights: [0.333333, 0.333333, 0.333333]
  analytic_3x3:
    note: "Аналітичний, перевірено програмно й вручну; TFN за шкалою Сааті. ОСНОВНИЙ оракул."
    matrix:
      - "r1: (1,1,1)        (2,3,4)        (4,5,6)"
      - "r2: (1/4,1/3,1/2)  (1,1,1)        (2,3,4)"
      - "r3: (1/6,1/5,1/4)  (1/4,1/3,1/2)  (1,1,1)"
    row_geometric_means:
      - "r1 = (2.000000, 2.466212, 2.884499)"
      - "r2 = (0.793701, 1.000000, 1.259921)"
      - "r3 = (0.346681, 0.405480, 0.500000)"
    expected_weights: [0.629498, 0.263186, 0.107315]   # сума = 1, порядок C1>C2>C3
    tolerance: 1e-6
  literature_oracle:
    source: "kahraman_fuzzy_2008, §2.4 (Buckley's Fuzzy AHP), формули (9)–(10) с. 64"
    status: "НЕ ПРИДАТНИЙ як прямий оракул центроїда."
    reason: >-
      Звірено з PDF (docs/sources/files/90/): числовий приклад §2.4 (с. 67+) використовує
      ТРАПЕЦІЄПОДІБНІ нечіткі числа (4-кортежі (a,b,c,d)), а не трикутні. Книга лишає ваги
      нечіткими (формула (15), w_i=(a_i/a, b_i/b, c_i/c, d_i/d)) і не застосовує центроїд
      (l+m+u)/3. Тому опубліковані ваги прикладу НЕ зійдуться з трикутно-центроїдною
      реалізацією цього плану. Формули (9)–(10) с. 64 підтверджують сам метод Buckley
      (середнє геометричне рядка → нечітка вага), і саме на них спирається 1.2.2.
    action: "Для тесту використовувати analytic_3x3 (трикутний, центроїд) — він і є літературно обґрунтованим оракулом методу Buckley."

