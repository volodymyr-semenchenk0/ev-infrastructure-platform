  - "Для будь-якої консистентної матриці усі ваги строго > 0 (тест на відсутність нулів)."
  - "На профілях municipal/investor (n=10): 0 нульових ваг; ваги монотонні за пріоритетами."
  - "make all зелений; mypy --strict mcdm/ без помилок; mcdm-verifier підтвердив."

