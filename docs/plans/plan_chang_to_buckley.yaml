# План для Claude Code: перехід FAHP з методу Чанга (extent analysis) на метод Buckley (geometric mean)
# КОДОВА ЧАСТИНА. Документацію (Розділ 1, Розділ 2, діаграми) ВЖЕ ВИКОНАНО й затверджено.
# Зміна зачіпає математичне ядро → виконувати за TDD (red → green → refactor) і верифікувати.

meta:
  title: "Міграція FAHP: Chang extent analysis → Buckley geometric mean (код)"
  project: "ev-charging-dss (курсова, спец. 124, ЧНУ)"
  date: "2026-05-29"
  author: "Volodymyr"
  vcs_note: >-
    Claude Code НЕ виконує git-операцій і не робить комітів (Cowork).
    Версійний контроль робить користувач самостійно.

objective: >-
  Замінити апарат виведення ваг FAHP з екстент-аналізу Чанга на метод середнього
  геометричного Buckley з центроїдною дефаззифікацією. Мета – усунути нульові ваги
  критеріїв (структурна вада Чанга при n>=4), зберігши інтерфейс і решту конвеєра.

rationale:
  problem: >-
    Метод Чанга присвоює нульову вагу критеріям, чий синтетичний екстент
    домінується (min ступенів можливості = 0). На реальних профілях (n=10) це
    7 із 10 критеріїв → ранжування фактично будується на 3 критеріях.
  fix: >-
    Buckley виводить ваги через середнє геометричне рядків нечіткої матриці й
    дефаззифікацію; ваги завжди додатні й монотонні за пріоритетами. Перевірено:
    на тих самих профілях Buckley дає 0 нулів.
  literature:
    - "buckley_fuzzy_1985 – першоджерело методу (Fuzzy hierarchical analysis)."
    - "kahraman_fuzzy_2008 – §2.4 покроковий алгоритм Buckley (формули (9)–(10), с. 64)."
    - "wang_extent_2008 – обґрунтування переходу: extent analysis може давати нульові/некоректні ваги."

# --- РІШЕННЯ (зафіксовані) --------------------------------------------------
decisions:
  weight_method: "Buckley (1985): row geometric mean → fuzzy weight → defuzz → normalize."
  defuzzification: "Центроїд (Center of Area): w_crisp = (l + m + u) / 3, далі нормалізація до суми 1."
  consistency_check: "БЕЗ ЗМІН. _consistency_ratio і гейт CR<=0.10 на модальній матриці лишаються."
  interface: "БЕЗ ЗМІН. fahp_weights(matrix (n,n,3)) -> weights (n,). Сервіси/API/фронтенд не чіпаємо."
  removed: "_degree_of_possibility і логіка синтетичних екстентів (Chang) видаляються."

constraints:
  - "Математичне ядро: спершу падаючий тест із числовим еталоном, потім реалізація (red→green→refactor)."
  - "Mock-и в тестах mcdm/ заборонені – лише реальні числові приклади з прив'язкою до BibTeX-ключа."
  - "Стохастики немає; зміна детермінована."
  - "Звіт при завершенні: які тести й результат; ruff; mypy --strict mcdm/; чи піднімається uvicorn/vite."

# --- СТАТУС ДОКУМЕНТАЦІЇ (виконано, прибрано з активних фаз) -----------------
